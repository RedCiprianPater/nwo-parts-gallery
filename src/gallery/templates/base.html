<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}NWO Parts Gallery{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@700;800&family=Inter+Tight:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff; --ink: #0a1f0f; --green: #1b8a3a;
      --green-bright: #00d65a; --green-soft: #e8f8ee;
      --green-deep: #0d3d1f; --grid: rgba(13,61,31,0.06);
      --muted: #4a5d50; --danger: #b91c1c; --warn: #d97706;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter Tight', sans-serif;
      background: var(--bg); color: var(--ink);
      background-image: linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,255,255,0.94); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--ink);
      padding: 16px 40px; display: flex; justify-content: space-between; align-items: center;
    }
    .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--ink); }
    .logo-mark { width: 24px; height: 24px; background: var(--green-bright); border: 2px solid var(--ink); transform: rotate(45deg); }
    nav a { font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink); text-decoration: none; margin-left: 24px; }
    nav a:hover { color: var(--green); }
    .badge { font-family: 'JetBrains Mono', monospace; font-size: 10px; padding: 4px 10px; background: var(--green-soft); border: 1px solid var(--green); color: var(--green-deep); }
    main { max-width: 1400px; margin: 0 auto; padding: 40px; }
    footer { border-top: 1px solid var(--ink); padding: 32px 40px; margin-top: 80px; display: flex; justify-content: space-between; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); }
    .mono { font-family: 'JetBrains Mono', monospace; }
    .tag { display: inline-block; font-size: 11px; padding: 2px 8px; background: var(--green-soft); color: var(--green-deep); border: 1px solid rgba(13,61,31,0.2); border-radius: 2px; margin: 2px; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
<header>
  <a href="/" class="logo"><div class="logo-mark"></div>NWO/PARTS</a>
  <nav>
    <a href="/gallery">Gallery</a>
    <a href="/gallery?sort_by=downloads">Popular</a>
    <a href="/docs">API</a>
  </nav>
  <div class="badge">OPEN PLATFORM</div>
</header>

<main>{% block content %}{% endblock %}</main>

<footer>
  <div>// nworobotics.cloud · parts gallery · layer 2</div>
  <div>MIT License · Agent-published · Not for resale</div>
</footer>
</body>
</html>
